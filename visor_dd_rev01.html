var N=5;
var OX=2407056.17867,OY=4806284.23453,OZ=829.05285,R=290.87100;

var cur=0, renderer, scene, camera, meshLTN, meshesAV=[];

function fmt(n){return n.toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2});}

function bMesh(verts,faces,color,op){
  var nT=faces.length;
  var pos=new Float32Array(nT*9);
  for(var i=0;i<nT;i++){
    var f=faces[i];
    for(var j=0;j<3;j++){
      var v=verts[f[j]];
      pos[i*9+j*3]=v[0];pos[i*9+j*3+1]=v[1];pos[i*9+j*3+2]=v[2];
    }
  }
  var g=new THREE.BufferGeometry();
  g.setAttribute('position',new THREE.BufferAttribute(pos,3));
  g.computeVertexNormals();
  var r=parseInt(color.slice(1,3),16)/255,
      gr=parseInt(color.slice(3,5),16)/255,
      b=parseInt(color.slice(5,7),16)/255;
  var m=new THREE.Mesh(g,new THREE.MeshPhongMaterial({
    color:new THREE.Color(r,gr,b),opacity:op,transparent:true,
    side:THREE.DoubleSide,shininess:25
  }));
  return m;
}

function upKPI(i){
  var c=AV[i].computo;
  document.getElementById('ka').textContent=c.archivo;
  document.getElementById('kc').textContent=c.cota.toFixed(1)+' m.s.n.m';
  document.getElementById('kar').textContent=fmt(c.area)+' m²';
  document.getElementById('kd').textContent=fmt(c.desm)+' m³';
  document.getElementById('kt').textContent=fmt(c.terr)+' m³';
  document.getElementById('kb').textContent=fmt(c.bal)+' m³ '+c.tipo;
}

function goTo(i){
  i=Math.max(0,Math.min(N-1,i));
  meshesAV.forEach(function(m){m.visible=false;});
  if(meshLTN)meshLTN.visible=true;
  meshesAV[i].visible=true;
  cur=i;
  document.getElementById('tlb').textContent=AV[i].computo.archivo;
  document.getElementById('bm').disabled=(i===0);
  document.getElementById('bp').disabled=(i===N-1);
  upKPI(i);
}

function nav(d){goTo(cur+d);}

window.addEventListener('load',function(){
  if(typeof THREE==='undefined')return;
  var canvas=document.getElementById('c');
  renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true,alpha:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth,innerHeight);
  renderer.setClearColor(0x000000,0);
  renderer.shadowMap.enabled=true;

  scene=new THREE.Scene();
  camera=new THREE.PerspectiveCamera(45,innerWidth/innerHeight,0.001,50);

  // Luces
  scene.add(new THREE.AmbientLight(0xffffff,0.65));
  var dl=new THREE.DirectionalLight(0xffffff,0.8);
  dl.position.set(0.5,1,0.5);scene.add(dl);
  var dl2=new THREE.DirectionalLight(0xffffff,0.3);
  dl2.position.set(-0.5,-1,-0.5);scene.add(dl2);

  // LTN
  meshLTN=bMesh(LV,LF,'#8B6914',0.85);
  scene.add(meshLTN);

  // Avances
  for(var i=0;i<N;i++){
    var m=bMesh(AV[i].verts,AV[i].faces,AV[i].color,0.82);
    m.visible=false;
    scene.add(m);
    meshesAV.push(m);
  }

  // Cámara inicial
  var theta=0.5,phi=0.8,rad=1.4,tX=0,tY=0;
  function upCam(){
    phi=Math.max(0.01,Math.min(Math.PI-0.01,phi));
    rad=Math.max(0.05,Math.min(8,rad));
    camera.position.set(
      tX+rad*Math.sin(phi)*Math.sin(theta),
      tY+rad*Math.cos(phi),
      rad*Math.sin(phi)*Math.cos(theta)
    );
    camera.lookAt(tX,tY,0);
  }
  upCam();

  // Controles mouse
  var drag=false,lx=0,ly=0;
  canvas.addEventListener('mousedown',function(e){drag=true;lx=e.clientX;ly=e.clientY;});
  window.addEventListener('mouseup',function(){drag=false;});
  canvas.addEventListener('mousemove',function(e){
    if(!drag)return;
    var dx=(e.clientX-lx)*0.006,dy=(e.clientY-ly)*0.006;
    if(e.shiftKey){tX-=dx*Math.cos(theta)*rad*0.4;tY+=dy*rad*0.35;}
    else{theta-=dx;phi+=dy;}
    lx=e.clientX;ly=e.clientY;upCam();
  });
  canvas.addEventListener('wheel',function(e){rad*=e.deltaY>0?1.1:0.91;upCam();},{passive:true});

  // Touch
  var t0x=0,t0y=0,tDist=0,tDrg=false;
  canvas.addEventListener('touchstart',function(e){
    if(e.touches.length===1){tDrg=true;t0x=e.touches[0].clientX;t0y=e.touches[0].clientY;}
    if(e.touches.length===2){tDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
  },{passive:true});
  window.addEventListener('touchend',function(){tDrg=false;},{passive:true});
  canvas.addEventListener('touchmove',function(e){
    if(e.touches.length===1&&tDrg){
      var dx=e.touches[0].clientX-t0x,dy=e.touches[0].clientY-t0y;
      theta-=dx*0.007;phi+=dy*0.007;
      t0x=e.touches[0].clientX;t0y=e.touches[0].clientY;upCam();
    }
    if(e.touches.length===2){
      var d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      rad*=tDist/d;tDist=d;upCam();
    }
  },{passive:true});

  window.addEventListener('resize',function(){
    renderer.setSize(innerWidth,innerHeight);
    camera.aspect=innerWidth/innerHeight;
    camera.updateProjectionMatrix();
  });

  // UI
  document.getElementById('lm').style.display='none';
  document.getElementById('c').style.display='block';
  ['lg','kpi','bot'].forEach(function(id){document.getElementById(id).style.display='';} );
  if(N>0)goTo(0);

  (function loop(){requestAnimationFrame(loop);renderer.render(scene,camera);})();
});
